<!--
You might want to add additional HTML elements to ST. It's good practice to separate it out from your code
-->
<div class="example-extension-settings">
	<div class="inline-drawer">
		<div class="inline-drawer-toggle inline-drawer-header">
			<b>Stat-us Maximus</b>
			<div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
		</div>
		<div id="stat-us-max-settings-window" class="inline-drawer-content" style="padding: 0.5vh;">

			<div class="flex-container flex-column separator-bottom stat-us-max-custom-css">
				<b>Settings</b>

				<label class="flex-container">
					<input id="stat-us-max-edit-numbers-from-chat" stat-us-max-setting="editNumbersFromChat" type="checkbox" />
					Replace input macros in the chat UI with their respective inputs - Check the docs
				</label>

				<label class="flex-container">
					<input id="stat-us-max-auto-detect-participants" stat-us-max-setting="autoDetectParticipants" type="checkbox" />
					Automatically add Status data to active participants in the chat
				</label>

				<label class="flex-container">
					<input id="stat-us-max-hide-input-labels" stat-us-max-setting="hideInputLabels" type="checkbox" />
					Hide input labels in the popup menu
				</label>

				<div class="flex-container w-100">
					<a id="stat-us-max-check-docs" title="Link to the repository" class="menu_button w-100" type="button" target="_blank" href="https://github.com/leandrojofre/SillyTavern-Stat-us-Maximus?tab=readme-ov-file#features">
                        Open the docs
                    </a>
				</div>
			</div>

			<div class="flex-container flex-column">
				<b>Debug settings</b>

				<div class="flex-container">
					<input id="stat-us-max-check-configuration" class="menu_button" type="button" value="Check Configuration" />
					Print the configuration values ​​through the console
				</div>

				<label class="flex-container">
					<input id="stat-us-max-debug" stat-us-max-setting="debug" type="checkbox" />
					Enable/Disable the debug console logs
				</label>
			</div>

			<hr class="sysHR" />
		</div>
	</div>
</div>
