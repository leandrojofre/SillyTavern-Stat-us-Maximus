<div class="flex-container flex-center stat-us-maximus-entry hover-highlight">
    <div class="flex-container flex-center-row gap-10px fs-90p text-muted w-100 px-10px">
        <div class="fa-solid kill-switch fs-lr cursor-pointer" title="Toggle entry's active state." data-i18n="[title]Toggle entry's active state."></div>
        <div class="fa-solid fa-eye-slash cursor-pointer private-lamp"></div>

        <p class="text-left stat-us-maximus-entry-paragraph flex-grow-1 m-0 d-table break-spaces">
            <span class="status-title fake-inputs-container fw-bolder d-contents" data-field="key"></span>
            <span class="status-separator"></span>
            <span class="status-description fake-inputs-container d-contents" data-field="value"></span>
        </p>

        <div class="status-value-uid fa-solid fa-bars-progress cursor-pointer text-quote fs-lr m-0" aria-describedby="tooltip" title="Swap entry description." data-i18n="[title]Swap entry description."></div>
    </div>
</div>
